<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>歴史総合 学習アプリ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --panel: #fffdf8;
      --ink: #20242a;
      --muted: #6d7480;
      --line: #ddd3c4;
      --accent: #176b87;
      --accent-2: #8a4f1d;
      --good: #17694d;
      --bad: #b43131;
      --warn: #9a6500;
      --shadow: 0 8px 24px rgba(42, 31, 18, .10);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }
    button, input, select {
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      min-height: 44px;
      cursor: pointer;
      touch-action: manipulation;
    }
    button:active { transform: translateY(1px); }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
      font-weight: 700;
    }
    button.ghost {
      background: transparent;
    }
    button.good {
      border-color: var(--good);
      background: var(--good);
      color: white;
      font-weight: 700;
    }
    button.bad {
      border-color: var(--bad);
      background: var(--bad);
      color: white;
      font-weight: 700;
    }
    button.warn {
      border-color: var(--warn);
      color: var(--warn);
      font-weight: 700;
    }
    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(247, 243, 234, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: max(10px, env(safe-area-inset-top)) 14px 10px;
    }
    .brand {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .brand strong {
      font-size: 17px;
      line-height: 1.2;
    }
    .brand span {
      color: var(--muted);
      font-size: 12px;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 0 14px 10px;
    }
    .tab {
      min-height: 38px;
      font-size: 14px;
      font-weight: 700;
    }
    .tab.active {
      border-color: var(--accent);
      background: #e6f1f4;
      color: #0d5169;
    }
    main {
      flex: 1;
      padding: 16px 14px 84px;
    }
    body[data-screen="home"] main {
      padding-bottom: 176px;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .section {
      margin: 0 0 18px;
    }
    .section h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
    }
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .mode-card {
      min-height: 132px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      text-align: left;
      box-shadow: var(--shadow);
    }
    .mode-card:hover {
      border-color: rgba(23, 107, 135, .55);
    }
    .mode-card strong {
      font-size: 18px;
    }
    .mode-card small {
      color: var(--muted);
      line-height: 1.45;
    }
    .mode-card span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      background: #eef4ee;
      color: #2f604d;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 800;
    }
    .setup-panel, .quiz-panel, .result-panel, .empty-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .field {
      display: grid;
      gap: 8px;
      margin: 0 0 14px;
    }
    .field label {
      font-weight: 700;
      font-size: 14px;
    }
    .field input, .field select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: white;
      color: var(--ink);
    }
    .quick-counts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: -4px;
      margin-bottom: 14px;
    }
    .quick-counts button {
      min-height: 38px;
      font-size: 13px;
      font-weight: 800;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .quiz-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }
    .question {
      min-height: 190px;
      padding: 8px 0 14px;
      font-size: clamp(20px, 5vw, 30px);
      line-height: 1.55;
      font-weight: 800;
      word-break: auto-phrase;
      overflow-wrap: anywhere;
    }
    .question.fill {
      font-size: clamp(18px, 4.4vw, 26px);
      font-weight: 750;
    }
    .blank {
      display: inline-flex;
      min-width: min(180px, 54vw);
      min-height: 1.7em;
      align-items: center;
      justify-content: center;
      border-bottom: 3px solid var(--accent);
      color: var(--accent);
      padding: 0 8px;
    }
    .answer-box {
      position: sticky;
      bottom: 0;
      margin: 18px -16px -16px;
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      background: rgba(255, 253, 248, .98);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .answer-value {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: clamp(21px, 6vw, 34px);
      font-weight: 850;
      overflow-wrap: anywhere;
    }
    .answer-value.hidden-answer {
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }
    .judge-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .sort-list {
      display: grid;
      gap: 8px;
      margin: 14px 0;
    }
    .sort-item {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 8px;
      min-height: 70px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 8px;
    }
    .sort-item.correct {
      border-color: rgba(23, 105, 77, .55);
      background: #ecf8f2;
    }
    .sort-item.incorrect {
      border-color: rgba(180, 49, 49, .55);
      background: #fff0f0;
    }
    .sort-item.correct .sort-rank {
      background: var(--good);
      color: white;
    }
    .sort-item.incorrect .sort-rank {
      background: var(--bad);
      color: white;
    }
    .sort-rank {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: #e6f1f4;
      color: #0d5169;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      flex: 0 0 auto;
    }
    .sort-title {
      font-weight: 750;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .sort-move {
      width: 38px;
      min-height: 38px;
      font-weight: 900;
    }
    .sort-result {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff8e8;
      line-height: 1.5;
    }
    .sort-result-order {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    .sort-result-row {
      padding: 8px;
      border-radius: 8px;
      background: white;
      border: 1px solid var(--line);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .stat-card.featured {
      border-color: rgba(23, 107, 135, .45);
      background: #f9fffd;
    }
    .stat-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    .stat-kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .stat-kpi {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 8px;
      min-width: 0;
    }
    .stat-kpi span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }
    .stat-kpi strong {
      display: block;
      margin-top: 3px;
      font-size: 18px;
      line-height: 1.1;
    }
    .meter {
      margin: 8px 0 12px;
    }
    .meter-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .bar {
      height: 10px;
      background: #ede4d7;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
    }
    .bar.good > span {
      background: var(--good);
    }
    details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      margin: 10px 0;
      overflow: clip;
    }
    summary {
      padding: 12px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    summary::after {
      content: "開く";
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    details[open] summary::after {
      content: "閉じる";
    }
    .mistakes {
      max-height: 420px;
      overflow: auto;
      border-top: 1px solid var(--line);
    }
    .mistake {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      line-height: 1.45;
    }
    .mistake:last-child {
      border-bottom: 0;
    }
    .mistake strong {
      display: block;
      margin-bottom: 4px;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .float-nav {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 30;
      display: grid;
      gap: 8px;
    }
    body[data-screen="home"] .float-nav {
      bottom: 126px;
    }
    body[data-screen="quiz"] .float-nav {
      display: none;
    }
    .float-nav button {
      width: 46px;
      min-height: 46px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-weight: 900;
    }
    .result-dock {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 25;
      width: min(980px, 100%);
      transform: translateX(-50%);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(255, 253, 248, .96);
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 22px rgba(42, 31, 18, .10);
      backdrop-filter: blur(12px);
    }
    body[data-screen="home"] .result-dock {
      display: block;
    }
    .result-dock-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .dock-card {
      min-height: 82px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 8px;
      text-align: left;
    }
    .dock-card strong {
      display: block;
      font-size: 13px;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .dock-bars {
      display: grid;
      gap: 5px;
    }
    .dock-row {
      display: grid;
      grid-template-columns: 30px 1fr 34px;
      gap: 5px;
      align-items: center;
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
    }
    .dock-bar {
      height: 7px;
      border-radius: 999px;
      background: #ede4d7;
      overflow: hidden;
    }
    .dock-bar span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
    }
    .dock-row.accuracy .dock-bar span {
      background: var(--good);
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 70px;
      transform: translateX(-50%);
      background: #222;
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 40;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 720px) {
      .mode-grid, .stats-grid {
        grid-template-columns: 1fr;
      }
      body[data-screen="home"] main {
        padding-bottom: 254px;
      }
      .mode-card {
        min-height: 106px;
      }
      main {
        padding-inline: 10px;
      }
      .actions {
        grid-template-columns: 1fr;
      }
      .question {
        min-height: calc(100vh - 340px);
      }
      .judge-grid {
        grid-template-columns: 1fr;
      }
      .sort-item {
        grid-template-columns: auto 1fr auto auto;
      }
      .sort-title {
        font-size: 14px;
      }
      body[data-screen="home"] .float-nav {
        bottom: 208px;
      }
      .result-dock-grid {
        grid-template-columns: 1fr;
      }
      .dock-card {
        min-height: 62px;
      }
    }
  </style>
</head>
<body data-screen="home">
  <div class="app" id="top">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <strong>歴史総合 学習</strong>
          <span id="statusLine">ホーム</span>
        </div>
        <button class="ghost" id="resetButton" title="学習履歴をリセット">リセット</button>
      </div>
      <nav class="tabs" aria-label="画面切り替え">
        <button class="tab active" data-tab="home">ホーム</button>
        <button class="tab" data-tab="results">リザルト</button>
      </nav>
    </header>

    <main>
      <section class="screen active" id="homeScreen">
        <div class="section">
          <h2>問題形式</h2>
          <div class="mode-grid">
            <button class="mode-card" data-mode="qa">
              <strong>一問一答</strong>
              <small>問題文を見て用語を思い出す</small>
              <span>117問</span>
            </button>
            <button class="mode-card" data-mode="fill">
              <strong>穴埋め</strong>
              <small>文中の空欄に入る語句を思い出す</small>
              <span>230空欄</span>
            </button>
            <button class="mode-card" data-mode="sort">
              <strong>並び替え</strong>
              <small>同じタグの出来事を年代順に並べる</small>
              <span>4件ずつ</span>
            </button>
          </div>
        </div>
      </section>

      <section class="screen" id="setupScreen">
        <div class="setup-panel">
          <h2 id="setupTitle">設定</h2>
          <div class="field">
            <label for="countInput">問題数</label>
            <input id="countInput" type="number" min="1" max="50" value="10">
          </div>
          <div class="quick-counts" aria-label="問題数のショートカット">
            <button data-count-shortcut="5">5問</button>
            <button data-count-shortcut="10">10問</button>
            <button data-count-shortcut="20">20問</button>
          </div>
          <div class="field">
            <label for="poolSelect">出す問題</label>
            <select id="poolSelect">
              <option value="random">無作為</option>
              <option value="unanswered">未回答</option>
              <option value="weak">未回答 or 誤答した問題</option>
            </select>
          </div>
          <p class="muted" id="setupHint"></p>
          <div class="actions">
            <button id="backHomeButton">戻る</button>
            <button class="primary" id="startButton">開始</button>
          </div>
        </div>
      </section>

      <section class="screen" id="quizScreen">
        <div class="quiz-panel" id="quizPanel"></div>
      </section>

      <section class="screen" id="resultsScreen">
        <div class="section">
          <h2>リザルト</h2>
          <div class="stats-grid" id="statsGrid"></div>
        </div>
        <div class="section">
          <h2>間違えた問題</h2>
          <div id="mistakeDetails"></div>
        </div>
      </section>
    </main>
  </div>
  <div class="float-nav">
    <button id="toTopButton" title="一番上へ">↑</button>
    <button id="toBottomButton" title="一番下へ">↓</button>
  </div>
  <aside class="result-dock" aria-label="リザルトのミニグラフ">
    <div class="result-dock-grid" id="resultDock"></div>
  </aside>
  <div class="toast" id="toast"></div>

ill-s-19","text":"イギリスは、[プラッシーの戦い]をきっかけにインド、ベンガル地方の徴税権と行政権を獲得し、19世紀半ばまでにインド全域の制圧を達成した。","terms":["プラッシーの戦い"]},{"id":"fill-s-20","text":"イギリスのインド制圧に対して、東インド会社の[シパーヒー]による[インド大反乱]がおこったが鎮圧、それによりイギリスによる直接支配がはじまり、[インド帝国]が建国された。","terms":["シパーヒー","インド大反乱","インド帝国"]},{"id":"fill-s-21","text":"[ヒンドゥー教]や[イスラム教]が多かったインドにとって、支給された[エンフィールド銃]の装填のために、[牛脂や豚脂]を口に入れなければいけなかったことから、大きな反発が起こった。","terms":["ヒンドゥー教","イスラム教","エンフィールド銃","牛脂や豚脂"]},{"id":"fill-s-22","text":"イギリスはインドに対して[自由貿易]を押し付け、手織り産業の衰退が顕著となった。","terms":["自由貿易"]},{"id":"fill-s-23","text":"イギリスはインド人に対して、[英語]教育を施し、優秀なインド人を育成しようとした。そこで生まれたインド人らが、地位回復と自治を目指して、[インド国民会議]を結成した。","terms":["英語","インド国民会議"]},{"id":"fill-s-24","text":"インドのムンバイに作られた[旧ヴィクトリア駅]は、植民地時代の名残として[コロニアル様式]が多く残っている。","terms":["旧ヴィクトリア駅","コロニアル様式"]},{"id":"fill-s-25","text":"[インドの山岳鉄道群]は今でも現役で動いており、世界最古の山岳鉄道として知られている。特に[ダージリン・ヒマラヤ鉄道]が有名。","terms":["インドの山岳鉄道群","ダージリン・ヒマラヤ鉄道"]},{"id":"fill-s-26","text":"東南アジアは中国への中継点としてほぼ全域が植民地化された。そして、世界市場で売れる品を確保するために特定商品に頼る[モノカルチャー経済]が顕著となっていった。","terms":["モノカルチャー経済"]},{"id":"fill-s-27","text":"東南アジアの植民地としては、欧米の技術、タイやインドシナの食料、清や日本からの雑貨を結ぶ自由貿易港として[シンガポール]が栄えた。","terms":["シンガポール"]},{"id":"fill-s-28","text":"東南アジアで、[タイ]が唯一植民地支配を逃れた。その理由として、英仏の植民地の中間地点にある[緩衝国]という役割を果たしていたからである。","terms":["タイ","緩衝国"]},{"id":"fill-s-29","text":"タイの[ラーマ 5 世](別称：[チュラロンコン王])は奴隷廃止や諸制度整備などの近代化政策を進めていった。","terms":["ラーマ 5 世","チュラロンコン王"]},{"id":"fill-s-30","text":"[ポメランツ]教授が提唱した[大分岐論]とは、18 世紀中ごろまでは世界の経済力はほとんど差がなかったという主張であり、西洋中心にとらえてしまう[西洋中心史観]に大きな衝撃を与えた。","terms":["ポメランツ","大分岐論","西洋中心史観"]},{"id":"fill-s-31","text":"インドにある[ジャイプールの天文台]は、肉眼で天体観測ができるような天体観測施設であり、インドの科学技術水準の高さがうかがえる。","terms":["ジャイプールの天文台"]},{"id":"fill-s-32","text":"インドネシアにある[サワリントのオンビリン炭鉱遺産]は、地域の機構や社会に即した技術移入が行われたことを示している。","terms":["サワリントのオンビリン炭鉱遺産"]},{"id":"fill-s-33","text":"アヘン戦争以前の清では、ヨーロッパとの貿易を[広州]のみに限定する[広東貿易]を行っており、イギリスの自由貿易の要求には応じなかった。","terms":["広州","広東貿易"]},{"id":"fill-s-34","text":"イギリス・インド・清の間で行われていた[三角貿易]によって[アヘン]が大量に流入し、中国の[銀]が大量に流出していた。","terms":["三角貿易","アヘン","銀"]},{"id":"fill-s-35","text":"清の[林則徐]がイギリス商人のアヘンを没収・廃棄したことにより、イギリス側から損害賠償と自由貿易の構築を求められたことによって[アヘン戦争]が起こった。","terms":["林則徐","アヘン戦争"]},{"id":"fill-s-36","text":"アヘン戦争に敗北した中国は[南京条約]を結び、広州や上海などの５港の開港、香港島の割譲、[領事裁判権]の承認や、[関税自主権]の喪失を認めた。","terms":["南京条約","領事裁判権","関税自主権"]},{"id":"fill-s-37","text":"イギリスは、アヘン戦争後、清への輸出額が伸びないことに不満を持ち、[アロー戦争]が起こった。","terms":["アロー戦争"]},{"id":"fill-s-38","text":"アロー戦争に負けた中国は[北京条約]を結び、天津や漢口など１１港の開港、外国公使の常駐、[キリスト教]布教の自由、アヘン貿易の合法化を認めた。","terms":["北京条約","キリスト教"]},{"id":"fill-s-39","text":"北京条約の締結の仲介をしたロシアは、見返りとして[沿海州]を獲得した。","terms":["沿海州"]},{"id":"fill-s-40","text":"アヘンの密輸によって銀が流出したことによる物価の[上昇]、アヘン戦争の費用や賠償金によって、アヘン戦争後の清は深刻な財政難に陥っていた。","terms":["上昇"]},{"id":"fill-s-41","text":"キリスト教の影響を受けた[洪秀全]が[太平天国]を建国し、その勢力は一時北京にも迫る勢いであった。","terms":["洪秀全","太平天国"]},{"id":"fill-s-42","text":"中国では、[中体西用]を掲げ、祖国蕃や[李鴻章]を中心に[洋務運動]が始まった。","terms":["中体西用","李鴻章","洋務運動"]},{"id":"fill-s-43","text":"南京条約で開港されて以降、中国の外国貿易の重要な窓口として栄えた、[鼓浪嶼の歴史的共同租界]が世界遺産に登録された。","terms":["鼓浪嶼の歴史的共同租界"]},{"id":"fill-s-44","text":"中国が自国が世界の中心で最も優れており、周辺民族をただの野蛮な民族としてみなす[中華思想]が伝統的に根付いていた。","terms":["中華思想"]},{"id":"fill-s-45","text":"東アジアでは古代から皇帝である中国に[朝貢]する代わりに臣下として認めてもらう[冊封体制]があり、その代表例として[三跪九叩頭]という風習があった。","terms":["朝貢","冊封体制","三跪九叩頭"]},{"id":"fill-s-46","text":"ヨーロッパ社会では、東アジアとは対照的に国家間の関係は対等であるという[主権国家体制]という原則があり、国家間の関係については条約で規定するというものが基本だった。","terms":["主権国家体制"]},{"id":"fill-s-47","text":"[アヘン戦争]当時、イギリスは[海上]、清は[内陸]において強大な戦力を持っていたが、イギリスの[蒸気船]が、川を渡り内陸付近に接近したことにより力の均衡が崩れ、清が敗れるきっかけになった。","terms":["アヘン戦争","海上","内陸","蒸気船"]},{"id":"fill-s-48","text":"アヘンは[ケシの実]の乳液の複合物質であり、主成分は[モルヒネ]である。メソポタミアでは[喜び]の植物、ギリシアでは[悲しみ]を忘れさせる薬、ローマでは皇帝の嗜好品として知られていた。","terms":["ケシの実","モルヒネ","喜び","悲しみ"]},{"id":"fill-s-49","text":"アヘンは古代から使われていたものの、作用の根源は判明されておらず中毒症状が問題視され、ドイツ人の[ゼルチュルナー]がアヘンの有効成分の抽出に成功した。","terms":["ゼルチュルナー"]},{"id":"fill-s-50","text":"アヘン戦争後、復興のために重税をさらに課した中国政府に不満を持った人々によって[太平天国の乱]が起こった。","terms":["太平天国の乱"]},{"id":"fill-s-51","text":"中国は欧米の科学技術は軍事技術だけでなく、[民生や日用]にも有益であることに目を付け、幅広く欧米の技術を取り入れる方針を示した。","terms":["民生や日用"]},{"id":"fill-s-52","text":"洋務運動は、[中体西用]によって、あくまで中国が中心の改革であったことや、[アロー戦争]によって文化財破壊の記憶、中国民衆による鉄道敷設反対運動によって徹底されなかった。","terms":["中体西用","アロー戦争"]},{"id":"fill-s-53","text":"アロー戦争によって破壊された代表例として、中国の[頤和園]がある。庭園の最高傑作とも言われ、1886 年に復元された。","terms":["頤和園"]},{"id":"fill-s-54","text":"1792 年には根室に[ラクスマン]、1804 年には[レザノフ]が来航し、1808 年には、[フェートン号]が来航した、その他米国の捕鯨船の活動に対して、日本は[異国船打払令]を講じた。","terms":["ラクスマン","レザノフ","フェートン号","異国船打払令"]},{"id":"fill-s-55","text":"アヘン戦争の状況を知り、日本は異国船打払令を撤回し、[薪水給与令]を制定した。","terms":["薪水給与令"]},{"id":"fill-s-56","text":"開国以前の日本では、前野良沢らの[解体新書]や伊能忠敬の[大日本沿海輿地全図]が作られ、ほかにも蘭学を学ぶ塾も増加し、世界情勢は[別段風説書]などによって把握していた。","terms":["解体新書","大日本沿海輿地全図","別段風説書"]},{"id":"fill-s-57","text":"中国へ進出しようとしてアメリカが、日本への開国を迫るため、[ペリー]率いる[黒船]が日本へ来航した。その結果、[日米和親条約]が締結され、[下田]や[函館]の開港がされた。(現地民曰く、「[伊豆大島]が動いた」だそう)","terms":["ペリー","黒船","日米和親条約","下田","函館","伊豆大島"]},{"id":"fill-s-58","text":"1858 ごろには、[日米修好通商条約]が[ハリス]の影響で締結され、自由貿易の承認や、外国人の居住と商業活動を行う場所の設置、[領事裁判権]の承認や[関税自主権]の喪失などを認めた。","terms":["日米修好通商条約","ハリス","領事裁判権","関税自主権"]},{"id":"fill-s-59","text":"開港後の日本では、度重なる戦争による[中古武器]の輸入が主流で、ほかには[綿織物]や[絹織物]が主要であった。","terms":["中古武器","綿織物","絹織物"]},{"id":"fill-s-60","text":"開国後の日本の主な貿易港は[横浜]で、主な貿易相手は[イギリス]だった。また、開国後は物価が急上昇したことによって次第に幕府への不満も高まっていった。","terms":["横浜","イギリス"]},{"id":"fill-s-61","text":"ペリー来航をきっかけに欧米の軍事技術の収集や本欲を行う[蕃所調所]や欧米の造船技術、航海術を学ぶ[海軍伝習所]、江戸防衛のための[台場]、大量製鉄用に[韮山反射炉]が作られた。","terms":["蕃所調所","海軍伝習所","台場","韮山反射炉"]},{"id":"fill-s-62","text":"ペリーが日本へ持ってきた土産の中にあった物の中で特に日本人は[電信機]と[機関車]に大きな関心を寄せた。","terms":["電信機","機関車"]},{"id":"fill-s-63","text":"イギリスでは、[腕木通信]が普及していたが、視認性の悪さや情報量の少なさから世界中に普及されなかった。そこで生まれたのが[モールス信号]である。","terms":["腕木通信","モールス信号"]},{"id":"fill-s-64","text":"開国当時の日本人にとって海外科学技術や外国人とは政府の意向とは対照的に興味をそそる対象であった。代表例として、[ペリー]の似顔絵や、[黒船]見物禁止を破って見物する人々などがいた。","terms":["ペリー","黒船"]},{"id":"fill-s-65","text":"アジアにおいて欧米列強との出会いとそれによる変容のことをしばしば、[ウェスタンインパクト]という。","terms":["ウェスタンインパクト"]},{"id":"fill-s-66","text":"開国による物価上昇によって、幕府への不安、外国人への不満が募っていった。その結果、日米修好通商条約の締結を強行した[井伊直弼]が[桜田門外の変]にて暗殺された。","terms":["井伊直弼","桜田門外の変"]},{"id":"fill-s-67","text":"天皇の権威の元、外国を排斥しようとする[尊王攘夷論]が日本中に広まっていった。","terms":["尊王攘夷論"]},{"id":"fill-s-68","text":"薩摩藩士がイギリス人殺傷事件である[生麦事件]がおこり、[薩英戦争]が起こった。また、関門海峡を通過する外国船への砲撃をきっかけに、[英仏蘭米]に[下関]が占領された。","terms":["生麦事件","薩英戦争","英仏蘭米","下関"]},{"id":"fill-s-69","text":"[坂本龍馬]の仲介によって、薩摩藩と長州藩が[薩長同盟]を結び、討幕の方針を定めた。","terms":["坂本龍馬","薩長同盟"]},{"id":"fill-s-70","text":"江戸幕府 15 代[徳川慶喜]が政権を朝廷に返す[大政奉還]を行い、その後も権力を保とうとしたが、討幕派の計らいによって、天皇中心の国家を作る[王政復古の大号令]が宣言された。","terms":["徳川慶喜","大政奉還","王政復古の大号令"]},{"id":"fill-s-71","text":"新政府軍と旧幕府軍によって、[戊辰戦争]が起こり、新政府軍の勝利によって明治維新が進み、その方針として、[五箇条の御誓文]が定められた。","terms":["戊辰戦争","五箇条の御誓文"]},{"id":"fill-s-72","text":"討幕に即し、幕府の政治と経済の混乱により、[世直し一揆]や[ええじゃないか]などが起こった。","terms":["世直し一揆","ええじゃないか"]},{"id":"fill-s-73","text":"日本は 1867 年の[パリ万博]に公式に参加した。万博を主導したのは[ナポレオン三世]であり、日本が呼ばれた理由としては、欧米諸国だけでなく、アジア諸国を呼び込めるフランスの権威を示そうとした。","terms":["パリ万博","ナポレオン三世"]},{"id":"fill-s-74","text":"パリ万博は[科学]と[芸術]の進歩を増進させる目的と、パリの商業の発展、フランスの権威回復が主な目的としてあった。","terms":["科学","芸術"]},{"id":"fill-s-75","text":"幕府が攘夷派の長州へとむけて[長州戦争]を行った。しかし[グラバー]らによる密売の結果もあり、最終的に攘夷派が勝利した。(のちにグラバーは長崎に日本最古の木造西洋建築施設として、[グラバー園]を建てた。)","terms":["長州戦争","グラバー","グラバー園"]},{"id":"fill-s-76","text":"当時のヨーロッパにとっては日本の認識はあくまでアジアの中の一国という印象であったが、パリ万博を通じ[ジャポニズム]という日本文化が広がっていった。","terms":["ジャポニズム"]},{"id":"fill-s-77","text":"富士山は、古代から信仰の対象や芸術の対象として認識されてきた。それにより、[富士山-信仰の対象と芸術の源泉]として世界遺産に登録された。","terms":["富士山-信仰の対象と芸術の源泉"]},{"id":"fill-s-78","text":"中央集権国家を作るために、各藩主が支配していた[領地・領民]を天皇のものとして、返還する[版籍奉還]が行われた。また、それに準じて、藩を県や府に置き換える[廃藩置県]によって、[府知事・県令]がおかれた。","terms":["領地・領民","版籍奉還","廃藩置県","府知事・県令"]},{"id":"fill-s-79","text":"新政府が安定した財政を目指し[地租改正条例]を定めた。土地を計測した[地価]を定め、所有者に[地券]を発行し、現金を収める仕組みを作った。また、新硬貨を作る[新貨条例]が定められた。","terms":["地租改正条例","地価","地券","新貨条例"]},{"id":"fill-s-80","text":"[富国強兵]のために、20 歳以上の男性に対して[徴兵令]や士族への給与の廃止をする[秩禄処分]、士族特権の廃止をする[廃刀令]が定められた。ほか[学問のすゝめ]をもとにした[学制]も始まった。","terms":["富国強兵","徴兵令","秩禄処分","廃刀令","学問のすゝめ","学制"]},{"id":"fill-s-81","text":"[四民平等]を目指し、[戸籍]を作り、公家は[華族]、武士は[士族]、その他が[平民]となったほか、[解放令]によって[えた・非人]身分の廃止がなされた。","terms":["四民平等","戸籍","華族","士族","平民","解放令","えた・非人"]},{"id":"fill-s-82","text":"文明開化によって、西洋的な文化を拡大させるために[違式詿違条例]が定められた。","terms":["違式詿違条例"]},{"id":"fill-s-83","text":"廃刀令や秩禄処分によって特権を奪われた士族によって[西南戦争]などが起こったほか、政策への反対一揆も起こった。","terms":["西南戦争"]},{"id":"fill-s-84","text":"明治政府の近代化として、[官営模範工場]として[富岡製糸場]が作られた。目的としては[生糸]の品質向上が大きかった。","terms":["官営模範工場","富岡製糸場","生糸"]},{"id":"fill-s-85","text":"官営模範工場が富岡に置かれた理由として[繭や石炭]が確保できる。[養蚕業]が盛ん、外国人への[攘夷意識]が少ない。などの条件が整っていたからである。","terms":["繭や石炭","養蚕業","攘夷意識"]},{"id":"fill-s-86","text":"富岡製糸場には和洋折衷の建築方式がとられており、[木骨レンガ造]や[トラス構造]が使われた。","terms":["木骨レンガ造","トラス構造"]},{"id":"fill-s-87","text":"日本初の鉄道は[新橋-横浜]間で作られ、[上野-高崎]を結ぶ高崎線で[横浜]まで生糸を輸送した。","terms":["新橋-横浜","上野-高崎","横浜"]},{"id":"fill-s-88","text":"明治維新は、外国の技術を参考にしたり、外国人を雇ったりはしたが、[経済的]支配を逃れるため、資本は国内で成立させた。かつ、[官営模範工場]を使うことによって、[短期間]且つ[広範囲]の発展を目指した。","terms":["経済的","官営模範工場","短期間","広範囲"]},{"id":"fill-s-89","text":"欧米との条約改正と視察のために[岩倉使節団]が世界各国を回った。","terms":["岩倉使節団"]},{"id":"fill-s-90","text":"日本は清と[日清修好条規]を定め、日本と清の対等な関係を結ぼうとした。","terms":["日清修好条規"]},{"id":"fill-s-91","text":"朝鮮は中国の属国であったため、日本の中では朝鮮を武将で制圧する[征韓論]が主張された。その後、[江華島事件]を口実に、[日朝修好条規]を結び、朝鮮を属国とした。","terms":["征韓論","江華島事件","日朝修好条規"]},{"id":"fill-s-92","text":"琉球島民が[台湾]に漂着した際に殺害されたことによって、[台湾出兵]を行い、琉球は自国の領土だという主張をした。さらに、琉球を日本領[沖縄県]とする[琉球処分]を行った。","terms":["台湾","台湾出兵","沖縄県","琉球処分"]},{"id":"fill-s-93","text":"ロシアと日本は、[日露和親条約]によって条約を結んだほか、[樺太・千島交換条約]によって国境を正確に定めた。","terms":["日露和親条約","樺太・千島交換条約"]},{"id":"fill-s-94","text":"北海道の開拓については、[開拓使]の設置によって[北海道]へと改称し、失業した[士族]が[屯田兵]となり担った。","terms":["開拓使","北海道","士族","屯田兵"]},{"id":"fill-s-95","text":"アイヌが住んでいた土地は原住民の言葉で、[アイヌ・モシリ]といい、アイヌとは[人間]を意味する。また、アイヌ語は[口承言語]であり、近年では[消滅危機言語]にも登録されている。","terms":["アイヌ・モシリ","人間","口承言語","消滅危機言語"]},{"id":"fill-s-96","text":"琉球王国では日本へと併合するにあたって、[方言札]を使って、公用語に強制した。","terms":["方言札"]},{"id":"fill-s-97","text":"北海道を、支配ではなく開拓の方向性を取った背景にはロシアによる[南下政策]があった。幕府も開拓を試みたが、寒さ故にうまくいかなかった。そこで、アメリカの[西部開拓]を参考にして開拓を行った。","terms":["南下政策","西部開拓"]},{"id":"fill-s-98","text":"[樺太・千島交換条約]によって国境が決定されたことよって、[強制移住]とともに離ればなれになってしまうケースも存在した。","term     function showToast(text) {
      const toast = byId("toast");
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function showScreen(name) {
      Object.values(screens).forEach((screen) => screen.classList.remove("active"));
      screens[name].classList.add("active");
      document.body.dataset.screen = name;
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.tab === (name === "results" ? "results" : "home")));
      byId("statusLine").textContent = name === "results" ? "リザルト" : currentMode ? MODE_META[currentMode].label : "ホーム";
      if (name === "results") renderResults();
      if (name === "home") renderResultDock();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getItemsForMode(mode) {
      if (mode === "qa") return DATA.qa;
      if (mode === "fill") return DATA.fill.blanks;
      return sortableEvents;
    }

    function getStat(mode, id) {
      return results[mode][id] || { attempts: 0, correct: 0, wrong: 0, review: 0, last: "none" };
    }

    function isWeak(mode, id) {
      const stat = getStat(mode, id);
      return !stat.attempts || stat.last !== "correct";
    }

    function chooseSetup(mode) {
      currentMode = mode;
      byId("setupTitle").textContent = MODE_META[mode].label + "の設定";
      const total = getItemsForMode(mode).length;
      byId("countInput").max = mode === "sort" ? 20 : Math.min(total, 100);
      byId("countInput").value = mode === "sort" ? 5 : 10;
      byId("setupHint").textContent = mode === "sort"
        ? "同じタグを持つ出来事を4つ抽出して、年代順に並び替えます。"
        : total + MODE_META[mode].totalLabel + "から出題します。";
      showScreen("setup");
    }

    function shuffle(items) {
      const list = [...items];
      for (let i = list.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }

    function filterPool(mode, poolType) {
      const items = getItemsForMode(mode);
      if (poolType === "unanswered") return items.filter((item) => !getStat(mode, item.id).attempts);
      if (poolType === "weak") return items.filter((item) => isWeak(mode, item.id));
      return items;
    }

    function makeFillQueue(items, count) {
      const picked = [];
      const recent = [];
      let pool = shuffle(items);
      while (picked.length < count && pool.length) {
        const avoidSentence = pool.length > 4 ? recent : [];
        let index = pool.findIndex((item) => !avoidSentence.includes(item.sentenceId));
        if (index < 0) index = 0;
        const [item] = pool.splice(index, 1);
        picked.push(item);
        recent.push(item.sentenceId);
        while (recent.length > 3) recent.shift();
      }
      return picked;
    }

    function startQuiz() {
      const count = Math.max(1, Number(byId("countInput").value || 1));
      const poolType = byId("poolSelect").value;
      const pool = filterPool(currentMode, poolType);
      if (!pool.length) {
        showToast("条件に合う問題がありません");
        return;
      }
      let questions;
      if (currentMode === "fill") {
        questions = makeFillQueue(pool, Math.min(count, pool.length));
      } else if (currentMode === "sort") {
        questions = makeSortQuestions(Math.min(count, 20), pool);
      } else {
        questions = shuffle(pool).slice(0, Math.min(count, pool.length));
      }
      quiz = {
        mode: currentMode,
        questions,
        index: 0,
        revealed: false,
        order: [],
        checked: false,
      };
      showScreen("quiz");
      renderQuestion();
    }

    function makeSortQuestions(count, allowedEvents) {
      const allowed = new Set(allowedEvents.map((event) => event.id));
      const groups = Object.values(sortGroups)
        .map((group) => group.filter((event) => allowed.has(event.id)))
        .filter((group) => group.length >= 4);
      const questions = [];
      for (let i = 0; i < count && groups.length; i += 1) {
        const group = groups[Math.floor(Math.random() * groups.length)];
        questions.push(shuffle(group).slice(0, 4));
      }
      return questions;
    }

    function renderQuestion() {
      const panel = byId("quizPanel");
      if (!quiz || quiz.index >= quiz.questions.length) {
        panel.innerHTML = '<div class="empty-panel"><h2>完了</h2><p class="muted">おつかれさまです。リザルトに反映しました。</p><div class="actions"><button id="againButton">同じ形式を続ける</button><button class="primary" id="viewResultsButton">リザルトを見る</button></div></div>';
        byId("againButton").onclick = () => chooseSetup(quiz.mode);
        byId("viewResultsButton").onclick = () => showScreen("results");
        return;
      }
      if (quiz.mode === "sort") {
        renderSortQuestion(panel);
        return;
      }
      const item = quiz.questions[quiz.index];
      const answer = quiz.mode === "qa" ? item.answer : item.answer;
      const questionHtml = quiz.mode === "qa" ? escapeHtml(item.question) : renderFillQuestion(item);
      panel.innerHTML = [
        '<div class="quiz-head"><span>' + MODE_META[quiz.mode].label + '</span><span>' + (quiz.index + 1) + ' / ' + quiz.questions.length + '</span></div>',
        '<div class="question ' + (quiz.mode === "fill" ? "fill" : "") + '">' + questionHtml + '</div>',
        '<div class="answer-box">',
        '<div class="answer-value ' + (quiz.revealed ? "" : "hidden-answer") + '">' + (quiz.revealed ? escapeHtml(answer) : "回答を表示するまで隠れています") + '</div>',
        quiz.revealed ? renderJudgeButtons() : '<button class="primary" id="revealButton" style="width:100%">回答を表示</button>',
        '</div>',
      ].join("");
      if (quiz.revealed) {
        bindJudgeButtons(item.id);
      } else {
        byId("revealButton").onclick = () => {
          quiz.revealed = true;
          renderQuestion();
          setTimeout(() => document.querySelector(".answer-box").scrollIntoView({ behavior: "smooth", block: "end" }), 60);
        };
      }
    }

    function renderFillQuestion(blank) {
      const sentence = sentenceMap.get(blank.sentenceId);
      let seen = -1;
      return escapeHtml(sentence.text).replace(/\[([^\[\]]+)\]/g, (_, term) => {
        seen += 1;
        if (seen === blank.termIndex) return '<span class="blank">　　　</span>';
        return '<span>' + escapeHtml(term) + '</span>';
      });
    }

    function renderJudgeButtons() {
      return '<div class="judge-grid"><button class="good" data-judge="correct">正解</button><button class="bad" data-judge="wrong">不正解</button><button class="warn" data-judge="review">あとで復習</button></div>';
    }

    function bindJudgeButtons(id) {
      document.querySelectorAll("[data-judge]").forEach((button) => {
        button.onclick = () => {
          record(quiz.mode, id, button.dataset.judge);
          nextQuestion();
        };
      });
    }

    function record(mode, id, outcome) {
      const prev = getStat(mode, id);
      const stat = {
        attempts: prev.attempts + 1,
        correct: prev.correct + (outcome === "correct" ? 1 : 0),
        wrong: prev.wrong + (outcome === "wrong" ? 1 : 0),
        review: prev.review + (outcome === "review" ? 1 : 0),
        last: outcome,
        lastAt: Date.now(),
      };
      results[mode][id] = stat;
      saveResults();
    }

    function nextQuestion() {
      quiz.index += 1;
      quiz.revealed = false;
      quiz.checked = false;
      quiz.order = [];
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderSortQuestion(panel) {
      const events = quiz.questions[quiz.index];
      if (!quiz.order.length) quiz.order = shuffle(events).map((event) => event.id);
      const correct = [...events].sort(compareEvents);
      const result = quiz.checked ? buildSortResult(correct) : "";
      panel.innerHTML = [
        '<div class="quiz-head"><span>並び替え: ' + escapeHtml(events[0].tag) + '</span><span>' + (quiz.index + 1) + ' / ' + quiz.questions.length + '</span></div>',
        '<div class="muted">古い順に並び替えてください。</div>',
        '<div class="sort-list">',
        quiz.order.map((id, index) => renderSortItem(eventMap.get(id), index, quiz.checked ? correct[index].id === id : null)).join(""),
        '</div>',
        quiz.checked ? result : '<button class="primary" id="checkSortButton" style="width:100%">判定</button>',
      ].join("");
      document.querySelectorAll("[data-move]").forEach((button) => {
        button.onclick = () => moveSortItem(Number(button.dataset.index), Number(button.dataset.move));
      });
      const check = byId("checkSortButton");
      if (check) {
        check.onclick = () => {
          judgeSort(correct);
          quiz.checked = true;
          renderQuestion();
          setTimeout(() => document.querySelector(".sort-result").scrollIntoView({ behavior: "smooth", block: "end" }), 60);
        };
      }
      const next = byId("nextSortButton");
      if (next) next.onclick = nextQuestion;
    }

    function compareEvents(a, b) {
      if (a.yearStart !== b.yearStart) return a.yearStart - b.yearStart;
      return a.title.localeCompare(b.title, "ja");
    }

    function renderSortItem(event, index, isCorrect) {
      const stateClass = isCorrect === null ? "" : isCorrect ? " correct" : " incorrect";
      const controls = isCorrect === null
        ? '<button class="sort-move" data-index="' + index + '" data-move="-1" title="上へ">↑</button><button class="sort-move" data-index="' + index + '" data-move="1" title="下へ">↓</button>'
        : '<div class="muted">' + (isCorrect ? "正解" : "違う") + '</div>';
      return '<div class="sort-item' + stateClass + '"><span class="sort-rank">' + (index + 1) + '</span><div class="sort-title">' + escapeHtml(event.title) + '</div>' + controls + '</div>';
    }

    function moveSortItem(index, delta) {
      const next = index + delta;
      if (next < 0 || next >= quiz.order.length) return;
      [quiz.order[index], quiz.order[next]] = [quiz.order[next], quiz.order[index]];
      renderQuestion();
    }

    function judgeSort(correct) {
      quiz.order.forEach((id, index) => {
        record("sort", id, correct[index].id === id ? "correct" : "wrong");
      });
    }

    function buildSortResult(correct) {
      const matches = quiz.order.filter((id, index) => correct[index].id === id).length;
      const rows = correct.map((event, index) => '<div class="sort-result-row">' + (index + 1) + '. ' + escapeHtml(event.year) + ' ' + escapeHtml(event.title) + '</div>').join("");
      return '<div class="sort-result"><strong>' + matches + ' / 4 正解</strong><div class="muted">正しい順序</div><div class="sort-result-order">' + rows + '</div><button class="primary" id="nextSortButton" style="width:100%;margin-top:12px">次へ</button></div>';
    }

    function renderResults() {
      renderStats();
      renderResultDock();
      renderMistakes();
    }

    function modeTotals(mode) {
      if (mode === "qa") return DATA.qa.length;
      if (mode === "fill") return DATA.fill.blanks.length;
      return sortableEvents.length;
    }

    function summarizeMode(mode) {
      const stats = Object.values(results[mode]);
      const answered = stats.filter((stat) => stat.attempts > 0).length;
      const attempts = stats.reduce((sum, stat) => sum + stat.attempts, 0);
      const correct = stats.reduce((sum, stat) => sum + stat.correct, 0);
      return {
        total: modeTotals(mode),
        answered,
        answerRate: modeTotals(mode) ? answered / modeTotals(mode) : 0,
        accuracy: attempts ? correct / attempts : 0,
        attempts,
      };
    }

    function renderStats() {
      byId("statsGrid").innerHTML = Object.keys(MODE_META).map((mode) => {
        const summary = summarizeMode(mode);
        return '<div class="stat-card' + (summary.attempts ? " featured" : "") + '"><h3>' + MODE_META[mode].label + '</h3>' +
          '<div class="stat-kpis"><div class="stat-kpi"><span>回答済み</span><strong>' + summary.answered + '</strong></div><div class="stat-kpi"><span>回答回数</span><strong>' + summary.attempts + '</strong></div></div>' +
          renderMeter("回答率", summary.answerRate, summary.answered + " / " + summary.total) +
          renderMeter("正答率", summary.accuracy, Math.round(summary.accuracy * 100) + "%", "good") +
          '</div>';
      }).join("");
    }

    function renderMeter(label, value, text, cls = "") {
      return '<div class="meter"><div class="meter-label"><span>' + label + '</span><span>' + text + '</span></div><div class="bar ' + cls + '"><span style="width:' + Math.round(value * 100) + '%"></span></div></div>';
    }

    function renderResultDock() {
      byId("resultDock").innerHTML = Object.keys(MODE_META).map((mode) => {
        const summary = summarizeMode(mode);
        return '<button class="dock-card" data-dock-mode="' + mode + '"><strong>' + MODE_META[mode].label + '</strong><div class="dock-bars">' +
          renderDockRow("回答", summary.answerRate) +
          renderDockRow("正答", summary.accuracy, "accuracy") +
          '</div></button>';
      }).join("");
      document.querySelectorAll("[data-dock-mode]").forEach((button) => {
        button.onclick = () => showScreen("results");
      });
    }

    function renderDockRow(label, value, cls = "") {
      const percent = Math.round(value * 100);
      return '<div class="dock-row ' + cls + '"><span>' + label + '</span><div class="dock-bar"><span style="width:' + percent + '%"></span></div><span>' + percent + '%</span></div>';
    }

    function renderMistakes() {
      byId("mistakeDetails").innerHTML = Object.keys(MODE_META).map((mode) => {
        const mistakes = getMistakes(mode);
        return '<details><summary>' + MODE_META[mode].label + ' - ' + mistakes.length + '件</summary><div class="mistakes">' +
          (mistakes.length ? mistakes.map((item) => renderMistake(mode, item)).join("") : '<div class="mistake muted">間違えた問題はまだありません。</div>') +
          '</div></details>';
      }).join("");
    }

    function getMistakes(mode) {
      const source = getItemsForMode(mode);
      return source.filter((item) => {
        const stat = getStat(mode, item.id);
        return stat.attempts > 0 && stat.last !== "correct";
      });
    }

    function renderMistake(mode, item) {
      const stat = getStat(mode, item.id);
      if (mode === "qa") {
        return '<div class="mistake"><strong>' + escapeHtml(item.question) + '</strong><div>答え: ' + escapeHtml(item.answer) + '</div>' + renderMiniStat(stat) + '</div>';
      }
      if (mode === "fill") {
        const sentence = sentenceMap.get(item.sentenceId);
        return '<div class="mistake"><strong>' + escapeHtml(item.answer) + '</strong><div>' + renderFillQuestion(item) + '</div>' + renderMiniStat(stat) + '</div>';
      }
      const event = item;
      return '<div class="mistake"><strong>' + escapeHtml(event.year) + ' ' + escapeHtml(event.title) + '</strong><div>タグ: ' + escapeHtml(event.tag) + '</div>' + renderMiniStat(stat) + '</div>';
    }

    function renderMiniStat(stat) {
      return '<div class="muted">正解 ' + stat.correct + ' / 回答 ' + stat.attempts + '、直近: ' + labelOutcome(stat.last) + '</div>';
    }

    function labelOutcome(outcome) {
      if (outcome === "correct") return "正解";
      if (outcome === "wrong") return "不正解";
      if (outcome === "review") return "あとで復習";
      return "未回答";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[ch]));
    }

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.onclick = () => chooseSetup(button.dataset.mode);
    });
    document.querySelectorAll("[data-count-shortcut]").forEach((button) => {
      button.onclick = () => {
        const max = Number(byId("countInput").max || 50);
        byId("countInput").value = Math.min(Number(button.dataset.countShortcut), max);
      };
    });
    tabs.forEach((tab) => {
      tab.onclick = () => {
        currentMode = null;
        showScreen(tab.dataset.tab);
      };
    });
    byId("backHomeButton").onclick = () => {
      currentMode = null;
      showScreen("home");
    };
    byId("startButton").onclick = startQuiz;
    byId("toTopButton").onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });
    byId("toBottomButton").onclick = () => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    byId("resetButton").onclick = () => {
      if (!confirm("このデバイスの学習履歴をリセットしますか？")) return;
      results = { qa: {}, fill: {}, sort: {} };
      saveResults();
      renderResults();
      renderResultDock();
      showToast("リセットしました");
    };
    renderResultDock();
  </script>
</body>
</html>
